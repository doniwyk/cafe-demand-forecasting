services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cafe_forecasting
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cafe_forecasting"]
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/cafe_forecasting
      PYTHONPATH: /app/ml-model
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./web/backend:/app/web/backend
      - ./ml-model:/app/ml-model
      - modeldata:/app/ml-model/models
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./web/frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5174:5173"
    environment:
      VITE_API_URL: http://backend:8001
    volumes:
      - ./web/frontend/src:/app/src
      - ./web/frontend/index.html:/app/index.html
      - ./web/frontend/package.json:/app/package.json
      - ./web/frontend/tsconfig.json:/app/tsconfig.json
      - ./web/frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./web/frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./web/frontend/vite.config.ts:/app/vite.config.ts
      - ./web/frontend/components.json:/app/components.json

volumes:
  pgdata:
  modeldata:
